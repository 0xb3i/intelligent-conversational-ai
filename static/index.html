<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒店评论智能问答</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-brand:#18E299;--color-brand-light:#d4fae8;--color-brand-deep:#0fa76e;
  --color-text:#0d0d0d;--color-text-secondary:#333;--color-text-muted:#666;--color-text-placeholder:#999;
  --color-bg:#fff;--color-surface:#f7f7f8;--color-border:rgba(0,0,0,0.06);--color-border-medium:rgba(0,0,0,0.1);
  --color-user-bg:#f7f7f8;--color-assistant-bg:#fff;
  --radius-sm:8px;--radius-md:16px;--radius-lg:24px;--radius-pill:9999px;
  --shadow-card:rgba(0,0,0,0.03) 0 2px 4px;--shadow-btn:rgba(0,0,0,0.06) 0 1px 2px;
  --font-sans:'Inter','Inter Fallback',system-ui,-apple-system,sans-serif;
  --font-mono:'Geist Mono','Geist Mono Fallback',ui-monospace,SFMono-Regular,monospace;
}
html{font-size:16px;line-height:1.5;height:100%}
body{font-family:var(--font-sans);color:var(--color-text);background:var(--color-bg);-webkit-font-smoothing:antialiased;height:100%;display:flex;flex-direction:column}
a{color:var(--color-brand-deep)}

/* Nav */
.nav{flex-shrink:0;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--color-border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;z-index:50}
.nav-brand{font-size:15px;font-weight:600;letter-spacing:-0.2px;display:flex;align-items:center;gap:8px}
.nav-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--color-brand)}
.nav-links{display:flex;gap:16px;align-items:center}
.nav-links a{font-size:13px;font-weight:500;color:var(--color-text-muted);transition:color .15s}
.nav-links a:hover{color:var(--color-brand-deep)}

/* Chat Area */
.chat-area{flex:1;overflow-y:auto;scroll-behavior:smooth}
.chat-container{max-width:768px;margin:0 auto;padding:24px 24px 140px}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 240px);text-align:center;padding:48px 24px}
.welcome h1{font-size:clamp(1.75rem,4vw,2.5rem);font-weight:600;line-height:1.2;letter-spacing:-0.8px;margin-bottom:12px}
.welcome h1 span{color:var(--color-brand)}
.welcome p{font-size:16px;color:var(--color-text-muted);max-width:480px;line-height:1.6;margin-bottom:32px}
.examples-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:560px}
.example-chip{font-size:13px;padding:8px 16px;border-radius:var(--radius-pill);border:1px solid var(--color-border);cursor:pointer;transition:all .15s;color:var(--color-text-muted);background:var(--color-bg)}
.example-chip:hover{border-color:var(--color-brand);color:var(--color-brand-deep);background:var(--color-brand-light)}

/* Messages */
.message{padding:20px 0;display:flex;gap:16px;align-items:flex-start}
.message+.message{border-top:1px solid var(--color-border)}
.message-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.message.user .message-avatar{background:var(--color-brand);color:#0d0d0d}
.message.assistant .message-avatar{background:var(--color-surface);border:1px solid var(--color-border)}
.message-body{flex:1;min-width:0}
.message-role{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-text-muted);margin-bottom:6px}
.message.user .message-role{color:var(--color-brand-deep)}
.message-content{font-size:15px;line-height:1.7;color:var(--color-text-secondary)}

/* Markdown rendering */
.message-content h1,.message-content h2,.message-content h3{font-weight:600;color:var(--color-text);margin:20px 0 8px;letter-spacing:-0.3px}
.message-content h1{font-size:1.4em}
.message-content h2{font-size:1.2em}
.message-content h3{font-size:1.05em}
.message-content p{margin:0 0 12px}
.message-content ul,.message-content ol{margin:0 0 12px;padding-left:24px}
.message-content li{margin-bottom:4px}
.message-content strong{font-weight:600;color:var(--color-text)}
.message-content em{font-style:italic}
.message-content blockquote{border-left:3px solid var(--color-brand);padding:4px 16px;margin:0 0 12px;color:var(--color-text-muted);background:var(--color-brand-light);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.message-content code{font-family:var(--font-mono);font-size:13px;background:var(--color-surface);padding:2px 6px;border-radius:4px;border:1px solid var(--color-border)}
.message-content pre{margin:0 0 12px;border-radius:var(--radius-sm);overflow-x:auto}
.message-content pre code{display:block;padding:12px 16px;background:var(--color-surface);border:1px solid var(--color-border);font-size:13px;line-height:1.5}
.message-content hr{border:none;border-top:1px solid var(--color-border);margin:16px 0}
.message-content table{border-collapse:collapse;margin:0 0 12px;width:100%}
.message-content th,.message-content td{border:1px solid var(--color-border);padding:6px 12px;text-align:left;font-size:14px}
.message-content th{background:var(--color-surface);font-weight:600}

/* Pipeline Cards (inside message) */
.pipeline-cards{margin:12px 0}
.stage-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden;transition:border-color .2s}
.stage-card.active{border-color:var(--color-brand)}
.stage-card.done{border-color:rgba(24,226,153,0.3)}
.stage-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;font-size:13px}
.stage-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:var(--color-bg);border:1px solid var(--color-border);transition:all .2s}
.stage-card.active .stage-icon{background:var(--color-brand-light);border-color:var(--color-brand);color:var(--color-brand-deep)}
.stage-card.done .stage-icon{background:var(--color-brand);border-color:var(--color-brand);color:#fff}
.stage-title{flex:1;font-weight:500}
.stage-badge{font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:2px 8px;border-radius:var(--radius-pill);background:var(--color-bg);color:var(--color-text-muted);border:1px solid var(--color-border);transition:all .2s}
.stage-card.active .stage-badge{background:var(--color-brand-light);color:var(--color-brand-deep);border-color:rgba(24,226,153,0.3)}
.stage-card.done .stage-badge{background:var(--color-brand);color:#0d0d0d;border-color:var(--color-brand)}
.stage-duration{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted)}
.stage-body{padding:0 14px 10px;display:none;font-size:13px;color:var(--color-text-muted);line-height:1.5}
.stage-card.expanded .stage-body{display:block}
.stage-body code{font-family:var(--font-mono);font-size:11px;background:var(--color-bg);padding:1px 5px;border-radius:3px;border:1px solid var(--color-border)}
.sub-query{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.sub-query .weight{font-family:var(--font-mono);font-size:10px;color:var(--color-brand-deep);background:var(--color-brand-light);padding:1px 6px;border-radius:var(--radius-pill)}

/* Spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--color-border);border-top-color:var(--color-brand);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Comments */
.comments-section{margin-top:16px}
.comments-toggle{font-size:13px;font-weight:500;color:var(--color-brand-deep);cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:4px 0;transition:opacity .15s}
.comments-toggle:hover{opacity:0.8}
.comments-list{margin-top:8px;display:none}
.comments-list.show{display:block}
.comment-card{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px;font-size:13px}
.comment-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.comment-rank{font-family:var(--font-mono);font-size:10px;font-weight:600;background:var(--color-brand);color:#0d0d0d;padding:1px 6px;border-radius:var(--radius-pill)}
.comment-tag{font-size:11px;padding:1px 6px;border-radius:var(--radius-pill);background:var(--color-surface);border:1px solid var(--color-border);color:var(--color-text-muted)}
.comment-text{color:var(--color-text-secondary);line-height:1.5}

/* Input Bar */
.input-bar{flex-shrink:0;border-top:1px solid var(--color-border);background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);padding:16px 24px 24px}
.input-container{max-width:768px;margin:0 auto}
.input-box{display:flex;gap:8px;align-items:flex-end;background:var(--color-surface);border:1px solid var(--color-border-medium);border-radius:var(--radius-lg);padding:8px 8px 8px 16px;transition:border-color .2s,box-shadow .2s}
.input-box:focus-within{border-color:var(--color-brand);box-shadow:0 0 0 3px rgba(24,226,153,0.12)}
.input-box textarea{flex:1;border:none;outline:none;font-family:var(--font-sans);font-size:15px;color:var(--color-text);background:transparent;resize:none;max-height:120px;line-height:1.5;padding:4px 0}
.input-box textarea::placeholder{color:var(--color-text-placeholder)}
.input-box button{width:36px;height:36px;border-radius:50%;background:var(--color-text);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s;flex-shrink:0}
.input-box button:hover{opacity:0.85}
.input-box button:disabled{opacity:0.3;cursor:not-allowed}
.input-box button svg{width:18px;height:18px}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding:0 4px}
.hyde-toggle{font-size:12px;color:var(--color-text-muted);display:flex;align-items:center;gap:5px}
.hyde-toggle input[type=checkbox]{accent-color:var(--color-brand);width:14px;height:14px}
.input-hint{font-size:11px;color:var(--color-text-placeholder)}

/* Responsive */
@media(max-width:768px){
  .chat-container{padding:16px 16px 140px}
  .nav{padding:0 16px}
  .input-bar{padding:12px 16px 20px}
  .welcome h1{letter-spacing:-0.5px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand"><span class="dot"></span> Hotel Review RAG</div>
  <div class="nav-links">
    <a href="https://github.com/0xb3i/intelligent-conversational-ai" target="_blank">GitHub</a>
  </div>
</nav>

<div class="chat-area" id="chatArea">
  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcomeSection">
      <h1>酒店评论<span>智能问答</span></h1>
      <p>基于 RAG 的多路检索增强生成系统，从 2000+ 真实住客评论中为您精准解答</p>
      <div class="examples-grid">
        <span class="example-chip" onclick="setQuery('酒店的床舒服吗？睡眠质量怎么样？')">🛏️ 床铺舒适度</span>
        <span class="example-chip" onclick="setQuery('早餐怎么样？有什么推荐？')">🍳 早餐体验</span>
        <span class="example-chip" onclick="setQuery('酒店安静吗？有没有噪音问题？')">🔇 安静程度</span>
        <span class="example-chip" onclick="setQuery('花园大床房的设施如何？')">🏡 花园大床房</span>
      </div>
    </div>
  </div>
</div>

<div class="input-bar">
  <div class="input-container">
    <div class="input-box">
      <textarea id="queryInput" placeholder="输入您的问题..." rows="1" onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
      <button id="queryBtn" onclick="submitQuery()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="input-footer">
      <label class="hyde-toggle"><input type="checkbox" id="hydeCheck"> HyDE 召回</label>
      <span class="input-hint">Enter 发送 · Shift+Enter 换行</span>
    </div>
  </div>
</div>

<script>
const STAGES = [
  {key:'query_process', title:'查询处理', icon:'🔍'},
  {key:'recall', title:'多路召回', icon:'📚'},
  {key:'fusion', title:'RRF 融合', icon:'🔗'},
  {key:'rerank', title:'Rerank 精排', icon:'🎯'},
  {key:'sort', title:'综合排序', icon:'📊'},
  {key:'generate', title:'LLM 生成', icon:'✨'},
];

let stageData = {};
let currentPipelineId = null;
let currentAnswerId = null;
let currentCommentsId = null;

marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, {language: lang}).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true,
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitQuery();
  }
}

function setQuery(q) {
  document.getElementById('queryInput').value = q;
  autoResize(document.getElementById('queryInput'));
  submitQuery();
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function submitQuery() {
  const input = document.getElementById('queryInput');
  const query = input.value.trim();
  if (!query) return;
  const hyde = document.getElementById('hydeCheck').checked;
  const btn = document.getElementById('queryBtn');
  btn.disabled = true;

  document.getElementById('welcomeSection').style.display = 'none';

  const container = document.getElementById('chatContainer');

  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.innerHTML = `
    <div class="message-avatar">👤</div>
    <div class="message-body">
      <div class="message-role">You</div>
      <div class="message-content">${escapeHtml(query)}</div>
    </div>
  `;
  container.appendChild(userMsg);

  const assistantMsg = document.createElement('div');
  assistantMsg.className = 'message assistant';
  const pipelineId = 'pipeline-' + Date.now();
  const answerId = 'answer-' + Date.now();
  const commentsId = 'comments-' + Date.now();
  currentPipelineId = pipelineId;
  currentAnswerId = answerId;
  currentCommentsId = commentsId;

  assistantMsg.innerHTML = `
    <div class="message-avatar">🤖</div>
    <div class="message-body">
      <div class="message-role">Assistant</div>
      <div class="message-content">
        <div class="pipeline-cards" id="${pipelineId}">
          ${STAGES.map(s => `
            <div class="stage-card" id="card-${s.key}-${pipelineId}">
              <div class="stage-header" onclick="toggleCard('${s.key}-${pipelineId}')">
                <div class="stage-icon" id="icon-${s.key}-${pipelineId}">${s.icon}</div>
                <div class="stage-title">${s.title}</div>
                <div class="stage-badge" id="badge-${s.key}-${pipelineId}">等待中</div>
                <span class="stage-duration" id="dur-${s.key}-${pipelineId}"></span>
              </div>
              <div class="stage-body" id="body-${s.key}-${pipelineId}"></div>
            </div>
          `).join('')}
        </div>
        <div id="${answerId}"></div>
        <div id="${commentsId}"></div>
      </div>
    </div>
  `;
  container.appendChild(assistantMsg);

  input.value = '';
  input.style.height = 'auto';
  scrollToBottom();

  stageData = {};

  fetch('/api/query', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({query, hyde})
  }).then(res => {
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    function read() {
      reader.read().then(({done, value}) => {
        if (done) { finish(); return; }
        buffer += decoder.decode(value, {stream:true});
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);
            if (data === '[DONE]') { finish(); return; }
            try { handleEvent(JSON.parse(data)); } catch(e) { console.error('parse error', e); }
          }
        }
        read();
      }).catch(err => { console.error('read error', err); finish(); });
    }
    read();
  }).catch(err => {
    console.error('fetch error', err);
    finish();
  });

  function finish() {
    btn.disabled = false;
    input.focus();
  }
}

function handleEvent(msg) {
  if (msg.stage === 'error') {
    const el = document.getElementById(currentAnswerId);
    if (el) el.innerHTML = `<p style="color:#d45656">❌ 查询出错: ${escapeHtml(msg.message)}</p>`;
    scrollToBottom();
    return;
  }

  if (msg.stage === 'result') {
    showAnswer(msg);
    return;
  }

  const key = msg.stage;
  const pid = currentPipelineId;
  const card = document.getElementById(`card-${key}-${pid}`);
  const icon = document.getElementById(`icon-${key}-${pid}`);
  const badge = document.getElementById(`badge-${key}-${pid}`);
  const dur = document.getElementById(`dur-${key}-${pid}`);
  const body = document.getElementById(`body-${key}-${pid}`);

  if (!card) return;

  if (msg.status === 'running') {
    card.className = 'stage-card active expanded';
    badge.textContent = '进行中';
    icon.innerHTML = '<span class="spinner"></span>';
    body.innerHTML = `<div style="color:var(--color-text-muted)">${msg.detail || '处理中...'}</div>`;
    scrollToBottom();
  }

  if (msg.status === 'done') {
    card.className = 'stage-card done';
    badge.textContent = '完成';
    dur.textContent = msg.duration ? `${msg.duration}s` : '';
    icon.textContent = STAGES.find(s=>s.key===key)?.icon || '✓';

    let detail = '';
    if (key === 'query_process') {
      if (msg.intent) {
        const items = [];
        if (msg.intent.room_type) items.push(`房型: <code>${msg.intent.room_type}</code>`);
        if (msg.intent.fuzzy_room_type) items.push(`模糊房型: <code>${msg.intent.fuzzy_room_type}</code>`);
        if (msg.intent.time_sensitivity) items.push('关注时效性');
        detail += items.length ? `<div style="margin-bottom:6px">${items.join(' · ')}</div>` : `<div style="margin-bottom:6px">未指定特殊偏好</div>`;
      }
      if (msg.sub_queries?.length) {
        detail += `<div style="margin-bottom:4px;font-weight:500">子查询:</div>`;
        for (const sq of msg.sub_queries) {
          detail += `<div class="sub-query"><span>${sq.query}</span><span class="weight">${sq.weight}</span></div>`;
        }
      }
      if (msg.hyde) {
        detail += `<div style="margin-top:6px">HyDE: <code>${msg.hyde}</code></div>`;
      }
    }
    if (key === 'recall') {
      if (msg.summary_categories?.length) {
        detail += `摘要类别: ${msg.summary_categories.map(c=>`<code>${c}</code>`).join(' ')}`;
      }
    }
    if (key === 'fusion') {
      detail += `合并后共 <code>${msg.fused_count}</code> 条候选`;
    }
    if (key === 'rerank') {
      detail += `筛选出最相关的 <code>${msg.reranked_count}</code> 条`;
    }
    if (key === 'sort') {
      detail += `相关性 40% · 质量 25% · 时效 20% · 其他 15%`;
    }
    if (key === 'generate') {
      detail += `耗时 <code>${msg.duration}s</code>`;
    }

    body.innerHTML = detail || '';
  }
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('expanded');
}

function showAnswer(msg) {
  const el = document.getElementById(currentAnswerId);
  if (!el) return;

  const html = marked.parse(msg.answer);
  el.innerHTML = `
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--color-border)">
      ${html}
    </div>
  `;

  if (msg.top_comments?.length) {
    const comEl = document.getElementById(currentCommentsId);
    if (comEl) {
      comEl.innerHTML = `
        <div class="comments-section">
          <span class="comments-toggle" onclick="this.nextElementSibling.classList.toggle('show');this.querySelector('.arrow').textContent=this.nextElementSibling.classList.contains('show')?'▼':'▶'">
            <span class="arrow">▶</span> 🏆 相关评论 Top ${msg.top_comments.length}
          </span>
          <div class="comments-list">
            ${msg.top_comments.map(c => `
              <div class="comment-card">
                <div class="comment-meta">
                  <span class="comment-rank">#${c.rank}</span>
                  <span class="comment-tag">${c.room_type || '未知房型'}</span>
                  <span class="comment-tag">评分 ${c.score_val}</span>
                  <span class="comment-tag">${c.publish_date}</span>
                </div>
                <div class="comment-text">${escapeHtml(c.comment)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
  }

  scrollToBottom();
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
